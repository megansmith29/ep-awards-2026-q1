           IOPS AWARDS ARTIFACT - COMPLETE CSS

        /* Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 28px;
        }
        
        .header-title-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
        }
        
        .header-leader {
            font-size: 15px;
            font-weight: 400;
            opacity: 0.9;
        }
        
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        /* SPARK Limiter Control */
        .limiter-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.15);
            padding: 12px 20px;
            border-radius: 8px;
        }
        
        .limiter-control label {
            font-weight: 500;
        }
        
        .limiter-slider {
            width: 200px;
            cursor: pointer;
            accent-color: white;
        }
        
        .limiter-value {
            font-weight: bold;
            min-width: 45px;
            text-align: right;
        }
        
        /* Statistics */
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        /* Tab Bar */
        .tab-bar {
            display: flex;
            gap: 5px;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
            background: white;
            padding: 0 15px;
            border-radius: 8px 8px 0 0;
            overflow-x: auto;
        }
        
        .tab {
            padding: 14px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 14px;
            color: #666;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .tab:hover {
            color: #667eea;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }
        
        .tab .count {
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .tab.active .count {
            background: #667eea;
            color: white;
        }
        
        /* Tab Content */
        .tab-content {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 0 0 8px 8px;
            min-height: 400px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Nominee Cards */
        .nominee-card, .team-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        
        .nominee-card:hover, .team-card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .card-header h3 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }
        
        .card-header h3 .rank {
            color: #667eea;
            font-weight: 700;
            margin-right: 8px;
        }
        
        /* Scores */
        .score-container {
            text-align: right;
        }
        
        .score-main {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            line-height: 1;
        }
        
        .score-breakdown {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        
        /* Badges */
        .badges {
            margin: 12px 0;
        }
        
        .badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            margin-right: 6px;
            margin-bottom: 4px;
        }
        
        .badge.snow {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .badge.spark {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .badge.tied {
            background: linear-gradient(135deg, #ffd89b 0%, #ff9a56 100%);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* Team Members */
        .team-members {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .team-members strong {
            color: #667eea;
        }
        
        /* Nomination Text Display */
        .nomination-text {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }
        
        .text-source {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .text-source.snow-source {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .text-source.spark-source {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .text-content {
            color: #555;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 3px solid #e0e0e0;
        }
        
        .nomination-text .snow-source + .text-content {
            border-left-color: #667eea;
        }
        
        .nomination-text .spark-source + .text-content {
            border-left-color: #f093fb;
        }
        
        /* Legacy explanation class (deprecated, use nomination-text instead) */
        .explanation {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            color: #555;
            font-size: 14px;
            line-height: 1.7;
        }
        
        /* Collapsible Scoring Notes */
        .scoring-notes-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 4px 0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            background: none;
            border: none;
            user-select: none;
        }
        
        .scoring-notes-toggle:hover {
            color: #764ba2;
        }
        
        .scoring-notes-toggle .toggle-icon {
            font-family: monospace;
            font-size: 14px;
        }
        
        .scoring-notes-content {
            display: none;
            margin-top: 8px;
            padding: 10px 12px;
            background: #f8f9fa;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .scoring-notes-content.expanded {
            display: block;
        }
        
        /* Overview / Methodology Sections */
        .methodology-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .methodology-section h3 {
            color: #333;
            margin: 0 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .methodology-section h4 {
            color: #667eea;
            margin: 20px 0 10px 0;
        }
        
        .methodology-section ul {
            margin: 10px 0;
            padding-left: 25px;
        }
        
        .methodology-section li {
            margin: 8px 0;
        }
        
        /* Category Criteria Tables */
        .category-criteria {
            margin: 20px 0;
        }
        
        .category-criteria table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .category-criteria th, 
        .category-criteria td {
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            text-align: left;
        }
        
        .category-criteria th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }
        
        .category-criteria tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        /* Consensus Summary */
        .consensus-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .consensus-summary h3 {
            margin: 0 0 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }
        
        .consensus-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .consensus-item {
            text-align: center;
        }
        
        .consensus-value {
            font-size: 24px;
            font-weight: bold;
        }
        
        .consensus-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-state p {
            font-size: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-title-row {
                flex-direction: column;
                gap: 4px;
            }
            
            .header-controls {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .stats {
                width: 100%;
                justify-content: space-around;
            }
            
            .tab {
                padding: 12px 15px;
                font-size: 13px;
            }
            
            .card-header {
                flex-direction: column;
            }
            
            .score-container {
                text-align: left;
                margin-top: 10px;
            }
        }

    <script>
        // ================================================
        // IOPS AWARDS ARTIFACT - COMPLETE JAVASCRIPT
        // ================================================
        //
        // DATA CONTRACT — artifact_data.json shape:
        //   nominations[]: flat array, each entry has:
        //     nominee (string), category (GEM|CI|RF|INV|TEAM),
        //     snow_score (number|null), spark_score (number|null),
        //     snow_count (int), spark_count (int),
        //     final_score (number), total_nominations (int),
        //     explanation (string), snow_text (string|null), spark_text (string|null)
        //     TEAM-only: team_members (string[]), team_size (int)
        //   statistics: { total_nominations, source_breakdown, category_breakdown, ... }
        //   scoring_metadata: { total_nominations, completed_nominations, scoring_complete }
        //   run_metadata: {
        //     pipeline_version: { version, codename, git_commit },
        //     model_identity: { family, variant },
        //     inference_parameters: { classification, scoring, consolidation },
        //     ingestion: { total_entries, snow_entries, spark_entries, unique_nominees },
        //     classification: { total_reclassified, reclassification_distribution },
        //     dedup: { duplicates_removed, team_groups_in, team_noms_out },
        //     timing: { pipeline_start, pipeline_end, total_duration_seconds }
        //   }
        //   run_label: string (dynamic title, defaults to "IOPS Awards")
        //   leader: string|null (optional leader name displayed in header)
        //
        // CSS CONTRACT — card HTML must use these classes:
        //   .card-header, .score-container, .score-main, .score-breakdown
        //   .badge.snow, .badge.spark, .badge.tied
        //   .nomination-text, .text-source.snow-source, .text-source.spark-source, .text-content
        //   .team-members
        // ================================================
        
        // Load data from embedded JSON
        const artifactData = JSON.parse(
            document.getElementById('artifact-data').textContent
        );
        
        /**
         * Category display mapping
         */
        const CATEGORY_MAP = {
            'GEM': { containerId: 'gem-content', tabId: 'gem', countId: 'gem-count' },
            'CI':  { containerId: 'ci-content',  tabId: 'ci',  countId: 'ci-count' },
            'RF':  { containerId: 'rf-content',  tabId: 'rf',  countId: 'rf-count' },
            'INV': { containerId: 'innovator-content', tabId: 'innovator', countId: 'innovator-count' },
            'TEAM': { containerId: 'team-content', tabId: 'team', countId: 'team-count' }
        };
        
        /**
         * Initialize artifact on page load
         */
        function initializeArtifact() {
            // Dynamic title/header from run_label
            const runLabel = artifactData.run_label || 'IOPS Awards';
            document.title = runLabel;
            const h1 = document.querySelector('.header h1');
            if (h1) h1.textContent = runLabel;

            // Leader display (optional)
            const leaderEl = document.getElementById('header-leader');
            if (leaderEl) {
                const leader = artifactData.leader;
                if (leader) {
                    leaderEl.textContent = 'Leader: ' + leader;
                }
            }

            const nominations = artifactData.nominations || [];
            const stats = artifactData.statistics || {};
            
            // Populate header statistics
            const totalEl = document.getElementById('total-nominees');
            if (totalEl) totalEl.textContent = stats.total_nominations || nominations.length;
            
            const src = stats.source_breakdown || {};
            const snowEl = document.getElementById('snow-count');
            if (snowEl) snowEl.textContent = (src.snow_only || 0) + (src.both_sources || 0);
            
            const sparkEl = document.getElementById('spark-count');
            if (sparkEl) sparkEl.textContent = (src.spark_only || 0) + (src.both_sources || 0);
            
            // Group by category
            const byCategory = {};
            nominations.forEach(n => {
                const cat = n.category || 'Unknown';
                if (!byCategory[cat]) byCategory[cat] = [];
                byCategory[cat].push(n);
            });
            
            // Sort each category by final_score descending, then populate
            Object.keys(CATEGORY_MAP).forEach(cat => {
                const list = (byCategory[cat] || []).slice();
                list.sort((a, b) => (b.final_score || 0) - (a.final_score || 0));
                
                if (cat === 'TEAM') {
                    populateTeams(list);
                } else {
                    populateCategory(cat, list);
                }
            });
            
            // Populate overview tab
            populateOverview(nominations, stats);
        }
        
        function setEl(id, value) {
            const el = document.getElementById(id);
            if (el && value !== undefined) el.textContent = value;
        }
        
        // ============================================================
        // OVERVIEW TAB
        // ============================================================
        
        const CATEGORY_LABELS = {
            'GEM': 'Going the Extra Mile',
            'CI': 'Continuous Improvement',
            'RF': 'Raving Fans',
            'INV': 'Innovator',
            'TEAM': 'Team Excellence'
        };
        
        /**
         * Format a duration in seconds to a human-readable string (e.g. "2m 30s").
         */
        function formatDuration(totalSeconds) {
            if (totalSeconds == null || isNaN(totalSeconds)) return '--';
            const s = Math.round(totalSeconds);
            if (s < 60) return s + 's';
            const m = Math.floor(s / 60);
            const rem = s % 60;
            if (m < 60) return m + 'm ' + rem + 's';
            const h = Math.floor(m / 60);
            const remM = m % 60;
            return h + 'h ' + remM + 'm ' + rem + 's';
        }

        /**
         * Render the Pipeline Details section from run_metadata.
         * Returns empty string if runMeta is absent.
         */
        function renderPipelineDetails(runMeta) {
            if (!runMeta) return '';

            const mi = runMeta.model_identity || {};
            const ip = runMeta.inference_parameters || {};
            const ing = runMeta.ingestion || {};
            const pv = runMeta.pipeline_version || {};
            const timing = runMeta.timing || {};

            // --- Dynamic inference parameter table ---
            // Build phases dynamically from whatever keys exist in inference_parameters
            const skipKeys = new Set(['model_id', 'model_family']);
            const prettyPhase = (k) => k.charAt(0).toUpperCase() + k.slice(1);
            const phases = Object.keys(ip).map(k => ({ label: prettyPhase(k), params: ip[k] || {} }));
            const allKeys = new Set();
            phases.forEach(p => Object.keys(p.params).forEach(k => {
                if (!skipKeys.has(k)) allKeys.add(k);
            }));
            // Stable column order: known keys first, then any extras alphabetically
            const knownOrder = ['temperature', 'max_tokens', 'top_k', 'top_p', 'frequency_penalty', 'presence_penalty', 'passes', 'concurrent', 'seed_mode', 'seed_step'];
            const orderedKeys = knownOrder.filter(k => allKeys.has(k));
            allKeys.forEach(k => { if (!orderedKeys.includes(k)) orderedKeys.push(k); });

            const prettyName = (k) => k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).replace('Top K', 'Top-K').replace('Top P', 'Top-P');
            const thStyle = 'padding:10px 12px;border:1px solid #e0e0e0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;';
            const tdStyle = 'padding:10px 12px;border:1px solid #e0e0e0;';

            const headerCells = '<th style="' + thStyle + '">Phase</th>' +
                orderedKeys.map(k => '<th style="' + thStyle + '">' + prettyName(k) + '</th>').join('');

            const renderRow = (phase, idx) => {
                const bg = idx % 2 === 1 ? ' style="background:#f8f9fa;"' : '';
                const cells = orderedKeys.map(k => {
                    const v = phase.params[k];
                    return '<td style="' + tdStyle + '">' + (v != null ? v : '--') + '</td>';
                }).join('');
                return '<tr' + bg + '><td style="' + tdStyle + '">' + phase.label + '</td>' + cells + '</tr>';
            };

            const tableRows = phases.map((p, i) => renderRow(p, i)).join('');

            return `
                <div class="methodology-section">
                    <h3>Pipeline Details</h3>

                    <h4>Model</h4>
                    <ul>
                        <li><strong>Family:</strong> ${mi.family || '--'}</li>
                        <li><strong>Variant:</strong> ${mi.variant || '--'}</li>
                    </ul>

                    <h4>Inference Parameters</h4>
                    <table class="category-criteria" style="width:100%;border-collapse:collapse;font-size:14px;">
                        <thead><tr>${headerCells}</tr></thead>
                        <tbody>${tableRows}</tbody>
                    </table>

                    <h4>Ingestion</h4>
                    <ul>
                        <li><strong>Total Entries:</strong> ${ing.total_entries != null ? ing.total_entries : '--'}</li>
                        <li><strong>SNOW Entries:</strong> ${ing.snow_entries != null ? ing.snow_entries : '--'}</li>
                        <li><strong>SPARK Entries:</strong> ${ing.spark_entries != null ? ing.spark_entries : '--'}</li>
                        <li><strong>Unique Nominees:</strong> ${ing.unique_nominees != null ? ing.unique_nominees : '--'}</li>
                    </ul>

                    <h4>Pipeline Version</h4>
                    <ul>
                        <li><strong>Version:</strong> ${pv.version || '--'}</li>
                        <li><strong>Codename:</strong> ${pv.codename || '--'}</li>
                        <li><strong>Git Commit:</strong> ${pv.git_commit || '--'}</li>
                    </ul>

                    <h4>Runtime</h4>
                    <ul>
                        <li><strong>Total Duration:</strong> ${formatDuration(timing.total_duration_seconds)}</li>
                    </ul>
                </div>
            `;
        }

        function populateOverview(nominations, stats) {
            const container = document.getElementById('overview-content');
            if (!container) return;
            
            const catBreakdown = stats.category_breakdown || {};
            const scoreRanges = stats.score_ranges || {};
            const src = stats.source_breakdown || {};
            const meta = artifactData.scoring_metadata || {};
            
            // Render Pipeline Details from run_metadata (empty string if absent)
            const pipelineDetailsHTML = renderPipelineDetails(artifactData.run_metadata);
            
            // No top-5 section — all nominees visible in category tabs
            
            // Build category rows
            const catOrder = ['GEM', 'CI', 'RF', 'INV', 'TEAM'];
            const catRows = catOrder
                .filter(c => catBreakdown[c])
                .map(c => {
                    const d = catBreakdown[c];
                    return `<tr>
                        <td><strong>${escapeHtml(CATEGORY_LABELS[c] || c)}</strong></td>
                        <td style="text-align:center">${d.count}</td>
                        <td style="text-align:center">${(d.avg_score || 0).toFixed(2)}</td>
                    </tr>`;
                }).join('');
            
            // Build score distribution rows
            const rangeDefs = [
                ['9-10', '9 – 10'],
                ['7-8',  '7 – 8'],
                ['5-6',  '5 – 6'],
                ['3-4',  '3 – 4'],
                ['below_3', 'Below 3']
            ];
            const total = stats.total_nominations || nominations.length || 1;
            const distRows = rangeDefs.map(([key, label]) => {
                const count = scoreRanges[key] || 0;
                const pct = ((count / total) * 100).toFixed(1);
                const barWidth = Math.min(100, (count / total) * 100);
                return `<tr>
                    <td>${label}</td>
                    <td style="text-align:center">${count}</td>
                    <td style="text-align:center">${pct}%</td>
                    <td style="width:40%"><div style="background:#667eea;height:16px;border-radius:4px;width:${barWidth}%"></div></td>
                </tr>`;
            }).join('');
            

            
            // Source analysis
            const snowOnly = src.snow_only || 0;
            const sparkOnly = src.spark_only || 0;

        // ============================================================
        // INDIVIDUAL NOMINEE CARDS
        // ============================================================
        
        function populateCategory(category, nominees) {
            const info = CATEGORY_MAP[category];
            if (!info) return;
            const container = document.getElementById(info.containerId);
            if (!container) return;
            
            container.innerHTML = '';
            
            if (!nominees || nominees.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No nominees in this category.</p></div>';
                return;
            }
            
            nominees.forEach((nom, idx) => {
                container.appendChild(createNomineeCard(nom, idx + 1));
            });
        }
        
        /**
         * Create a nominee card using CSS-contract classes:
         *   .card-header > h3 > .rank, .score-container > .score-main + .score-breakdown
         *   .badges > .badge.snow / .badge.spark
         *   .nomination-text > .text-source + .text-content
         */
        function createNomineeCard(nom, rank) {
            const card = document.createElement('div');
            card.className = 'nominee-card';
            
            // Data attributes for limiter recalculation
            const snowScore = nom.snow_score || 0;
            const sparkScore = nom.spark_score || 0;
            card.dataset.snowScore = snowScore;
            card.dataset.sparkScore = sparkScore;
            card.dataset.snowCount = nom.snow_count || 0;
            card.dataset.sparkCount = nom.spark_count || 0;
            card.dataset.currentScore = (nom.final_score || 0).toFixed(2);
            
            // Build badge HTML
            const snowCount = nom.snow_count || 0;
            const sparkCount = nom.spark_count || 0;
            let badgeHtml = '';
            if (snowCount > 0) {
                badgeHtml += '<span class="badge snow">SNOW</span>';
            }
            if (sparkCount > 0) {
                badgeHtml += `<span class="badge spark">SPARK (${sparkCount})</span>`;
            }
            
            // Build nomination text HTML
            let textHtml = '';
            if (nom.snow_text) {
                textHtml += `<span class="text-source snow-source">SNOW</span>
                    <div class="text-content">${escapeHtml(nom.snow_text)}</div>`;
            }
            if (nom.spark_text) {
                textHtml += `<span class="text-source spark-source">SPARK</span>
                    <div class="text-content">${escapeHtml(nom.spark_text)}</div>`;
            }
            
            // Collapsible Scoring Notes
            let scoringNotesHtml = '';
            if (nom.explanation) {
                scoringNotesHtml = `<button class="scoring-notes-toggle" onclick="toggleScoringNotes(this)">
                    <span class="toggle-icon">[+]</span> Scoring Notes
                </button>
                <div class="scoring-notes-content">${escapeHtml(nom.explanation)}</div>`;
            }
            
            // Score breakdown string
            let breakdown = buildBreakdown(snowCount, sparkCount, snowScore, sparkScore, 100);
            
            card.innerHTML = `
                <div class="card-header">
                    <h3><span class="rank">${rank}.</span> ${escapeHtml(nom.nominee)}</h3>
                    <div class="score-container">
                        <div class="score-main">${Number(nom.final_score || 0).toFixed(1)}</div>
                        <div class="score-breakdown">${breakdown}</div>
                    </div>
                </div>
                <div class="badges">${badgeHtml}</div>
                <div class="nomination-text">${textHtml}</div>
                ${scoringNotesHtml}
            `;
            
            return card;
        }
        
        // ============================================================
        // TEAM CARDS
        // ============================================================
        
        function populateTeams(teams) {
            const container = document.getElementById('team-content');
            if (!container) return;
            
            container.innerHTML = '';
            
            if (!teams || teams.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No teams in this category.</p></div>';
                return;

            teams.forEach((team, idx) => {
                container.appendChild(createTeamCard(team, idx + 1));

        function createTeamCard(team, rank) {
            const card = document.createElement('div');
            card.className = 'team-card';
            
            // Data attributes for limiter recalculation — mirror createNomineeCard
            const snowScore = team.snow_score || 0;
            const sparkScore = team.spark_score || 0;
            card.dataset.snowScore = snowScore;
            card.dataset.sparkScore = sparkScore;
            card.dataset.snowCount = team.snow_count || 0;
            card.dataset.sparkCount = team.spark_count || 0;
            card.dataset.currentScore = (team.final_score || 0).toFixed(2);
            
            const members = Array.isArray(team.team_members) ? team.team_members : [];
            const membersList = members.join(', ');
            const memberCount = team.team_size || members.length;
            
            // Build a short team label from first 3 members
            let teamLabel;
            if (members.length <= 3) {
                teamLabel = membersList;
            } else {
                teamLabel = members.slice(0, 3).join(', ') + ` + ${members.length - 3} more`;
            }
            
            // Build badge HTML — source-aware, same pattern as createNomineeCard
            const snowCount = team.snow_count || 0;
            const sparkCount = team.spark_count || 0;
            let badgeHtml = '';
            if (snowCount > 0) {
                badgeHtml += '<span class="badge snow">SNOW</span>';
            }
            if (sparkCount > 0) {
                badgeHtml += `<span class="badge spark">SPARK</span>`;
            }
            badgeHtml += `<span class="badge team-size">TEAM (${memberCount})</span>`;
            
            // Build nomination text HTML — source-aware
            let textHtml = '';
            if (team.snow_text) {
                textHtml += `<span class="text-source snow-source">SNOW</span>
                    <div class="text-content">${escapeHtml(team.snow_text)}</div>`;
            }
            if (team.spark_text) {
                textHtml += `<span class="text-source spark-source">SPARK</span>
                    <div class="text-content">${escapeHtml(team.spark_text)}</div>`;
            }
            
            // Collapsible Scoring Notes
            let scoringNotesHtml = '';

                scoringNotesHtml = `<button class="scoring-notes-toggle" onclick="toggleScoringNotes(this)">

                </button>
                <div class="scoring-notes-content">${escapeHtml(team.explanation)}</div>`;
            }
            
            // Score breakdown string via shared helper
            let breakdown = buildBreakdown(snowCount, sparkCount, snowScore, sparkScore, 100);
            
            card.innerHTML = `
                <div class="card-header">
                    <h3><span class="rank">${rank}.</span> ${escapeHtml(teamLabel)}</h3>

            return card;
        }
        
        // ============================================================
        // SCORE BREAKDOWN HELPER
        // ============================================================
        
        function buildBreakdown(snowCount, sparkCount, snowScore, sparkScore, limiterPct) {
            const limiter = limiterPct / 100;
            const adjustedSpark = sparkScore * limiter;

            if (snowCount > 0 && sparkCount > 0) {
                const snowIsBase = snowScore >= adjustedSpark;
                if (snowIsBase) {
                    const bonus = adjustedSpark * 0.1;
                    return `BASE: ${snowScore.toFixed(1)} (SNOW) | BONUS: (${sparkScore.toFixed(1)} × ${limiterPct}%) × 0.1 = ${bonus.toFixed(1)} (SPARK)`;
                } else {
                    const bonus = snowScore * 0.1;
                    return `BASE: ${sparkScore.toFixed(1)} × ${limiterPct}% = ${adjustedSpark.toFixed(1)} (SPARK) | BONUS: ${snowScore.toFixed(1)} × 0.1 = ${bonus.toFixed(1)} (SNOW)`;
                }
            } else if (snowCount > 0) {
                return `BASE: ${snowScore.toFixed(1)} (SNOW)`;
            } else {
                return `BASE: ${sparkScore.toFixed(1)} × ${limiterPct}% (SPARK)`;
            }
        }
        
        // ============================================================
        // HTML ESCAPING
        // ============================================================
        
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // ============================================================
        // SCORING NOTES TOGGLE
        // ============================================================
        
        function toggleScoringNotes(btn) {
            const content = btn.nextElementSibling;
            const icon = btn.querySelector('.toggle-icon');
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                icon.textContent = '[+]';
            } else {
                content.classList.add('expanded');
                icon.textContent = '[\u2212]';
            }
        }
        
        // ============================================================
        // TAB SWITCHING
        // ============================================================
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            const contentEl = document.getElementById(`${tabName}-content`);
            if (contentEl) contentEl.classList.add('active');
            
            const tabEl = document.getElementById(`${tabName}-tab`);
            if (tabEl) tabEl.classList.add('active');
        }
        
        // ============================================================
        // SPARK LIMITER — recalculate scores & re-rank
        // ============================================================
        
        function recalculateScores(limiterPercent) {
            const limiter = limiterPercent / 100;
            
            // --- Individual nominee cards ---
            document.querySelectorAll('.nominee-card').forEach(card => {
                const snowScore = parseFloat(card.dataset.snowScore) || 0;
                const sparkScore = parseFloat(card.dataset.sparkScore) || 0;
                const snowCount = parseInt(card.dataset.snowCount) || 0;
                const sparkCount = parseInt(card.dataset.sparkCount) || 0;
                
                // Hide SPARK-only at 0%
                if (limiterPercent === 0 && snowCount === 0) {
                    card.style.display = 'none';
                    return;
                }
                card.style.display = '';
                
                const adjustedSpark = sparkScore * limiter;
                
                // Calculate final score per formula
                let finalScore = 0;
                if (snowScore > 0 && adjustedSpark > 0) {
                    const base = Math.max(snowScore, adjustedSpark);
                    const smaller = Math.min(snowScore, adjustedSpark);
                    finalScore = base + smaller * 0.1;
                } else if (snowScore > 0) {
                    finalScore = snowScore;
                } else {
                    finalScore = adjustedSpark;
                }
                
                card.dataset.currentScore = finalScore.toFixed(2);
                
                // Update rendered score
                const scoreEl = card.querySelector('.score-main');
                if (scoreEl) scoreEl.textContent = finalScore.toFixed(1);
                
                // Update breakdown
                const breakdownEl = card.querySelector('.score-breakdown');
                if (breakdownEl) {
                    breakdownEl.textContent = buildBreakdown(snowCount, sparkCount, snowScore, sparkScore, limiterPercent);
                }
                
                // Toggle SPARK badge visibility at 0%
                const sparkBadge = card.querySelector('.badge.spark');
                if (sparkBadge) sparkBadge.style.display = limiterPercent === 0 ? 'none' : '';
            });
            
            // --- Team cards (source-aware, mirrors individual logic) ---
            document.querySelectorAll('.team-card').forEach(card => {
                const snowScore = parseFloat(card.dataset.snowScore) || 0;
                const sparkScore = parseFloat(card.dataset.sparkScore) || 0;
                const snowCount = parseInt(card.dataset.snowCount) || 0;
                const sparkCount = parseInt(card.dataset.sparkCount) || 0;
                
                // Hide SPARK-only teams at 0%
                if (limiterPercent === 0 && snowCount === 0) {
                    card.style.display = 'none';
                    return;
                }
                card.style.display = '';
                
                const adjustedSpark = sparkScore * limiter;
                
                // Calculate final score per formula (same as individual)
                let finalScore = 0;
                if (snowScore > 0 && adjustedSpark > 0) {
                    const base = Math.max(snowScore, adjustedSpark);
                    const smaller = Math.min(snowScore, adjustedSpark);
                    finalScore = base + smaller * 0.1;
                } else if (snowScore > 0) {
                    finalScore = snowScore;
                } else {
                    finalScore = adjustedSpark;
                }
                
                card.dataset.currentScore = finalScore.toFixed(2);
                
                const scoreEl = card.querySelector('.score-main');
                if (scoreEl) scoreEl.textContent = finalScore.toFixed(1);
                
                const breakdownEl = card.querySelector('.score-breakdown');
                if (breakdownEl) {
                    breakdownEl.textContent = buildBreakdown(snowCount, sparkCount, snowScore, sparkScore, limiterPercent);
                }
                
                // Toggle SPARK badge visibility at 0%
                const sparkBadge = card.querySelector('.badge.spark');
                if (sparkBadge) sparkBadge.style.display = limiterPercent === 0 ? 'none' : '';
            });
            
            // Re-rank all categories
            updateCategoryRankings();
        }
        
        // ============================================================
        // RANKING UPDATE — re-sort, re-number, tie badges
        // ============================================================
        
        function updateCategoryRankings() {
            Object.values(CATEGORY_MAP).forEach(info => {
                const container = document.getElementById(info.containerId);
                if (!container) return;
                
                const cardSelector = info.containerId === 'team-content' ? '.team-card' : '.nominee-card';
                const cards = Array.from(container.querySelectorAll(cardSelector))
                    .filter(c => c.style.display !== 'none');
                
                // Sort by score desc, then tie-break: SNOW > SPARK, more entries first
                cards.sort((a, b) => {
                    const sa = parseFloat(a.dataset.currentScore) || 0;
                    const sb = parseFloat(b.dataset.currentScore) || 0;
                    if (sb !== sa) return sb - sa;
                    
                    const snowA = parseInt(a.dataset.snowCount) || 0;
                    const snowB = parseInt(b.dataset.snowCount) || 0;
                    if (snowB !== snowA) return snowB - snowA;
                    
                    const spA = parseInt(a.dataset.sparkCount) || 0;
                    const spB = parseInt(b.dataset.sparkCount) || 0;
                    return spB - spA;
                });
                
                // Group by score for tie detection
                let currentRank = 1;
                let i = 0;
                while (i < cards.length) {
                    const score = parseFloat(cards[i].dataset.currentScore) || 0;
                    // Collect all cards with this score
                    const group = [cards[i]];
                    while (i + group.length < cards.length &&
                           Math.abs((parseFloat(cards[i + group.length].dataset.currentScore) || 0) - score) < 0.005) {
                        group.push(cards[i + group.length]);
                    }
                    
                    const isTied = group.length > 1;
                    group.forEach(card => {
                        const rankEl = card.querySelector('.rank');
                        if (rankEl) rankEl.textContent = `${currentRank}.`;
                        
                        const badges = card.querySelector('.badges');
                        let tieBadge = badges ? badges.querySelector('.badge.tied') : null;
                        if (isTied && !tieBadge && badges) {
                            tieBadge = document.createElement('span');
                            tieBadge.className = 'badge tied';
                            tieBadge.textContent = 'Tied';
                            badges.appendChild(tieBadge);
                        } else if (!isTied && tieBadge) {
                            tieBadge.remove();
                        }
                        
                        container.appendChild(card);
                    });
                    
                    currentRank += group.length;
                    i += group.length;
                }
                
                // Update tab count
                const countEl = document.getElementById(info.countId);
                if (countEl) countEl.textContent = cards.length;
                
                // Empty state
                const emptyState = container.querySelector('.empty-state');
                if (emptyState) emptyState.style.display = cards.length === 0 ? 'block' : 'none';
            });
        }
        
        // ============================================================
        // INITIALIZATION
        // ============================================================
        
        document.addEventListener('DOMContentLoaded', function() {
            initializeArtifact();
            
            const slider = document.getElementById('spark-limiter');
            const display = document.getElementById('limiter-display');
            
            if (slider && display) {
                slider.addEventListener('input', function() {
                    const value = parseInt(this.value);
                    display.textContent = `${value}%`;
                    recalculateScores(value);
                });
                
                // Initial calculation at 100%
                recalculateScores(100);
            }
        });

      voter, votes
    };
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',

        body: JSON.stringify(payload)
      });
    } catch(e) { console.warn('Sheet write failed', e); }
  }

  async function loadFromSheet() {
    try {
      const res = await fetch(SCRIPT_URL + '?nocache=' + Date.now());
      const data = await res.json();
      const votes = {};
      (data.rows || []).forEach(row => {
        if (!row[1] || row[1]==='voter') return;
        votes[row[1]] = { GEM:row[2]||'', CI:row[3]||'', RF:row[4]||'', INV:row[5]||'', TEAM:row[6]||'' };
      });
      return votes;

      console.warn('Sheet read failed, using localStorage fallback');
      try { return JSON.parse(localStorage.getItem('ep_awards_votes') || '{}'); } catch { return {}; }

  // ── State ────────────────────────────────────────────────────────
  let voterName = '';
  let picks = {}; // { catKey: { name, isWriteIn } }

  // ── Build HTML ───────────────────────────────────────────────────
  function buildApp() {

          <input type="text" id="va-name-input" placeholder="Your full name" autocomplete="off"
            oninput="window._vaUpdateBtn()"

  // ── Button enable ────────────────────────────────────────────────
  window._vaUpdateBtn = function() {
    const v = document.getElementById('va-name-input').value.trim();
    document.getElementById('va-start-btn').disabled = !v;
  };

  // ── Begin voting ─────────────────────────────────────────────────
  window._vaBegin = function() {
    const raw = document.getElementById('va-name-input').value.trim();
    if (!raw) return;

    picks = {};

    document.getElementById('va-entry').style.display = 'none';
    document.getElementById('va-progress-wrap').style.display = 'block';
    document.getElementById('va-voter-label').textContent = raw;
    document.getElementById('va-submit-row').style.display = 'flex';
    document.getElementById('va-confirm').style.display = 'none';

    renderCards();
    updateProgress();

  // ── Render category cards ────────────────────────────────────────
  function renderCards() {
    const container = document.getElementById('va-cards');
    container.style.display = 'block';
    container.innerHTML = '';

    VA_CATS.forEach((cat, ci) => {
      const opts = cat.nominees.map((n, ni) => `
        <div class="va-opt" id="vaopt-${cat.key}-${ni}"
          onclick="window._vaSelect('${cat.key}',${ni},'${escQ(n.name)}',false)">

      `).join('');

      const card = document.createElement('div');
      card.className = 'va-card';
      card.id = `vacard-${cat.key}`;
      card.innerHTML = `
        <div class="va-card-head">
          <div>
            <div class="va-cat-num">Category ${ci+1} of ${VA_CATS.length}</div>
            <div class="va-cat-title">${cat.label}</div>

          <div class="va-cat-chip pending" id="vachip-${cat.key}">Choose winner</div>

          <div class="va-writein-row" id="vawi-${cat.key}" onclick="window._vaSelectWI('${cat.key}')">
            <div class="va-radio" id="vawi-radio-${cat.key}"></div>

  function escQ(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

  // ── Select option ────────────────────────────────────────────────
  window._vaSelect = function(catKey, idx, name, isWI) {
    const cat = VA_CATS.find(c=>c.key===catKey);
    // Clear all
    cat.nominees.forEach((_,i) => document.getElementById(`vaopt-${catKey}-${i}`)?.classList.remove('va-selected'));
    const wiRow = document.getElementById(`vawi-${catKey}`);
    wiRow?.classList.remove('va-selected');
    document.getElementById(`vawi-input-${catKey}`)?.classList.remove('va-show');

    document.getElementById(`vaopt-${catKey}-${idx}`)?.classList.add('va-selected');
    picks[catKey] = { name, isWI: false };
    updateCard(catKey, name);
    updateProgress();

  window._vaSelectWI = function(catKey) {
    const cat = VA_CATS.find(c=>c.key===catKey);

      delete picks[catKey];
      updateCard(catKey, null);

  function updateCard(catKey, name) {
    const card = document.getElementById(`vacard-${catKey}`);

      btn.disabled = false;
    } else {
      note.innerHTML = `<b>${remaining}</b> categor${remaining===1?'y':'ies'} remaining`;
      btn.disabled = true;
    }
  }

  // ── Submit ───────────────────────────────────────────────────────
  window._vaSubmit = async function() {
    if (Object.keys(picks).length < VA_CATS.length) return;
    const btn = document.getElementById('va-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const voteData = {};
    VA_CATS.forEach(cat => { if (picks[cat.key]) voteData[cat.key] = picks[cat.key].name; });

    await submitToSheet(voterName, voteData);

    // Also cache locally as fallback
    try {
      const local = JSON.parse(localStorage.getItem('ep_awards_votes') || '{}');
      local[voterName] = voteData;
      localStorage.setItem('ep_awards_votes', JSON.stringify(local));
    } catch(e) {}

    document.getElementById('va-progress-wrap').style.display = 'none';
    document.getElementById('va-cards').style.display = 'none';
    document.getElementById('va-submit-row').style.display = 'none';
    document.getElementById('va-confirm').style.display = 'block';
    document.getElementById('va-confirm-msg').textContent =
      'Your votes have been saved to the shared tally. Scroll down to see live results.';

    await renderResults();
  };

  // ── Reset ────────────────────────────────────────────────────────
  window._vaReset = function() {
    voterName = '';
    picks = {};
    document.getElementById('va-name-input').value = '';
    document.getElementById('va-start-btn').disabled = true;
    document.getElementById('va-confirm').style.display = 'none';
    document.getElementById('va-entry').style.display = 'block';
  };

  // ── Clear all ────────────────────────────────────────────────────
  window._vaClear = function() {
    if (!confirm('Clear ALL votes? This cannot be undone.\n\nNote: This clears your local view. To fully reset, delete rows in the Google Sheet directly.')) return;
    localStorage.removeItem('ep_awards_votes');
    renderResults();
  };

  // ── Render results ───────────────────────────────────────────────
  async function renderResults() {
    const body = document.getElementById('va-results-body');
    if (body) body.innerHTML = '<div style="color:#aaa;font-size:13px;padding:12px 0;">Loading votes from shared database…</div>';
    const votes = await loadFromSheet();
    const voterCount = Object.keys(votes).length;
    document.getElementById('va-results-sub').textContent =
      voterCount === 0 ? 'No votes recorded yet.'
        : `${voterCount} voter${voterCount!==1?'s have':' has'} submitted votes.`;

    const body = document.getElementById('va-results-body');
    if (!body) return;
    body.innerHTML = '';

    VA_CATS.forEach(cat => {
      const tally = {};
      Object.entries(votes).forEach(([voter, vpicks]) => {
        const pick = vpicks[cat.key];
        if (pick) { if (!tally[pick]) tally[pick]=[]; tally[pick].push(voter); }
      });
      const sorted = Object.entries(tally).sort((a,b)=>b[1].length-a[1].length);
      const maxV = sorted.length ? sorted[0][1].length : 0;
      const totalCat = sorted.reduce((s,[,v])=>s+v.length,0);

      const sec = document.createElement('div');
      sec.className = 'va-result-cat';
      sec.innerHTML = `<div class="va-result-cat-title">${cat.label}${totalCat?` <span style="font-weight:400;color:#aaa;font-size:11px;">(${totalCat} vote${totalCat!==1?'s':''})</span>`:''}</div>`;

      if (!sorted.length) {
        sec.innerHTML += `<div class="va-no-votes">No votes yet</div>`;
      } else {
        sorted.forEach(([name, voters], i) => {
          const pct = maxV>0?(voters.length/maxV)*100:0;
          const isTop = i===0;
          const row = document.createElement('div');
          row.innerHTML = `
            <div class="va-result-row">
              <div class="va-result-rank ${isTop?'top':''}">${isTop?'🥇':i+1}</div>
              <div class="va-result-name">${name}</div>
              <div class="va-result-track"><div class="va-result-fill ${isTop?'top':''}" style="width:${pct}%"></div></div>
              <div class="va-result-count ${isTop?'top':''}">${voters.length}</div>
            </div>
            <div class="va-result-voters">${voters.join(' · ')}</div>
          `;
          sec.appendChild(row);
        });
      }
      body.appendChild(sec);
    });
  }

  // ── Init when tab is clicked ─────────────────────────────────────
  // Patch switchTab to build the app on first visit
  const _origSwitch = window.switchTab;
  window.switchTab = function(tabName) {
    _origSwitch(tabName);
    if (tabName === 'vote') {
      const app = document.getElementById('vote-app');
      if (!app.dataset.built) {
        buildApp();
        app.dataset.built = '1';
      } else {
        renderResults(); // refresh tally each time you open the tab
      }
    }
  };
})();
</script>
</body>
